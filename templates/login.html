<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #ff4d4d, #b30000);
        }

        /* NAVBAR */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #800000;
            padding: 15px 40px;
            color: white;
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
        }

        .nav-links a {
            text-decoration: none;
            color: white;
            margin-left: 20px;
            transition: 0.3s;
        }

        .nav-links a:hover {
            color: #ffd6d6;
        }

        /* LOGIN FORM */
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 85vh;
        }

        .login-box {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 320px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.3);
            text-align: center;
        }

        .login-box h2 {
            margin-bottom: 20px;
            color: #b30000;
        }

        .input-box {
            width: 100%;
            margin-bottom: 15px;
        }

        .input-box input {
            width: 100%;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        .btn {
            width: 100%;
            padding: 10px;
            background-color: #ff4d4d;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        .btn:hover {
            background-color: #e60000;
        }

        /* FOOTER */
        .footer {
            background-color: #222;
            color: white;
            text-align: center;
            padding: 10px;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">🩸 BloodBank</div>
    <div class="nav-links">
        <a href="{% url 'home' %}">Home</a>
        <a href="{% url 'register' %}">Register</a>
        <a href="{% url 'login' %}">Login</a>
        <a href="{% url 'search' %}">Search</a>
    </div>
</div>

<!-- LOGIN FORM -->
<div class="login-container">
    <div class="login-box">
        <h2>Login Here</h2>

        <form action="{% url 'login' %}" method="post">
            {% csrf_token %}

            <div class="input-box">
                <input type="text" name="name" placeholder="Enter Username" required>
            </div>

            <div class="input-box">
                <input type="password" name="password" placeholder="Enter Password" required>
            </div>

            <input type="submit" value="Login" class="btn">
        </form>
    </div>
</div>

<!-- FOOTER -->
<div class="footer">
    <p>© 2026 Blood Donation System</p>
</div>

</body>
</html>
